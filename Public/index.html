<script>
  document.getElementById('login-btn').addEventListener('click', function (e) {
    e.preventDefault();

    // Ocultamos solo el botón
    document.getElementById('login-btn').style.display = 'none';

    // Creamos el formulario dentro de un card
    const section = document.getElementById('content-section');
    const cardDiv = document.createElement('div');
    cardDiv.className = 'login-card';

    cardDiv.innerHTML = `
      <h5 class="mb-3"></h5>
      <form>
        <div class="form-group">
          <input type="text" class="form-control" placeholder="Username">
        </div>
        <div class="form-group">
          <input type="password" class="form-control" placeholder="Password">
        </div>
        <button type="submit" class="btn btn-primary btn-block">Submit</button>
      </form>
    `;

    section.appendChild(cardDiv);

    // Redirige directamente al dashboard.html al enviar el formulario
    cardDiv.querySelector('form').addEventListener('submit', function(e) {
      e.preventDefault();
      window.location.href = 'dashboard.html';
    });
  });
</script>

<style>
  

  /* El contenedor del anuncio */
.vamped-popup {
    position: fixed;
    z-index: 10000;
    background: #000;
    border: 2px solid #ff0055; /* Borde neón */
    box-shadow: 0 0 15px rgba(255, 0, 85, 0.5);
    width: 280px;
    padding: 5px;
    display: none; /* Se activa por JS */
}

/* Cabecera de la ventana (estilo Fallout) */
.popup-header {
    background: #ff0055;
    color: #000;
    font-size: 10px;
    font-weight: bold;
    padding: 3px 8px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    text-transform: uppercase;
    margin-bottom: 5px;
}

.popup-close {
    cursor: pointer;
    background: #000;
    color: #ff0055;
    padding: 0 5px;
    border: 1px solid #000;
}

.popup-content img {
    width: 100%;
    display: block;
    filter: contrast(1.1) brightness(0.9);
}

/* Efecto de parpadeo para que moleste un poco */
.vamped-popup.active {
    display: block;
    animation: popupIn 0.2s ease-out;
}

@keyframes popupIn {
    0% { transform: scale(0.5); opacity: 0; }
    100% { transform: scale(1); opacity: 1; }
}
</style>

<div id="popup-container"></div>
</body>


<script>
  
  // Lista de tus archivos en la carpeta /anuncios2
const imagenesAnuncios = [
    'chikinami_1.jpg', 
    'vamper_girl_cute.jpg', 
    'lore_ad_1.jpg',
    'curiosidad_vamper.jpg'
];

function spawnPopup() {
    const container = document.getElementById('popup-container');
    const randomImg = imagenesAnuncios[Math.floor(Math.random() * imagenesAnuncios.length)];
    
    // Crear el elemento
    const popup = document.createElement('div');
    popup.className = 'vamped-popup active';
    
    // Posición aleatoria en pantalla
    const top = Math.random() * (window.innerHeight - 300);
    const left = Math.random() * (window.innerWidth - 280);
    popup.style.top = `${top}px`;
    popup.style.left = `${left}px`;

    popup.innerHTML = `
        <div class="popup-header">
            <span>⚠️ VAMPER_SYSTEM_AD</span>
            <span class="popup-close" onclick="this.parentElement.parentElement.remove()">X</span>
        </div>
        <div class="popup-content">
            <img src="/anuncios2/${randomImg}">
        </div>
    `;

    container.appendChild(popup);

    // Auto-destrucción opcional tras 10 segundos para no colapsar la web
    setTimeout(() => { if(popup) popup.remove(); }, 15000);
}

// Lógica de aparición: Un anuncio nuevo cada 30 a 60 segundos
function startAdSystem() {
    const randomTime = Math.random() * (60000 - 30000) + 30000;
    setTimeout(() => {
        spawnPopup();
        startAdSystem(); // Se llama a sí mismo para el siguiente
    }, randomTime);
}

// Arrancar cuando cargue la página
window.onload = () => {
    // ... tus otras funciones (loadNearby, etc)
    startAdSystem();
};
</script>
